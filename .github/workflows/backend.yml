name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests with coverage
        run: uv run tox -e py312

      - name: Verify coverage file exists
        run: |
          if [ ! -f coverage.xml ]; then
            echo "::error::backend/coverage.xml was not produced by the test run"
            exit 1
          fi
          echo "coverage.xml size: $(wc -c < coverage.xml) bytes"

      - name: Coverage summary
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          root = ET.parse("backend/coverage.xml").getroot()
          line_rate = float(root.get("line-rate", 0)) * 100
          branch_rate = float(root.get("branch-rate", 0)) * 100
          covered = int(root.get("lines-covered", 0))
          valid = int(root.get("lines-valid", 0))
          print(f"## Backend coverage")
          print(f"| metric | value |")
          print(f"| --- | --- |")
          print(f"| Line rate | {line_rate:.2f}% ({covered} / {valid}) |")
          print(f"| Branch rate | {branch_rate:.2f}% |")
          print()
          print("Download the full report from the **backend-coverage** artifact.")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv run tox -e lint

  format:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv run tox -e format

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv run tox -e type
