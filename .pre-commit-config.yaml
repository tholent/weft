# Pre-commit hooks enforcing the same invariants CI enforces.
#
# Install once per clone:
#   pip install pre-commit   # or: uv tool install pre-commit
#   pre-commit install
#
# The backend hooks run inside the project .venv (not an isolated hook
# environment) so mypy picks up the real locked dependencies and
# behaves identically to `uv run tox -e type`.

repos:
  - repo: local
    hooks:
      # --------- Backend ---------
      - id: backend-ruff-check
        name: backend ruff check
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
        entry: bash -c 'cd backend && UV_PROJECT_ENVIRONMENT=.venv uv run ruff check .'

      - id: backend-ruff-format
        name: backend ruff format --check
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
        entry: bash -c 'cd backend && UV_PROJECT_ENVIRONMENT=.venv uv run ruff format --check .'

      - id: backend-mypy
        name: backend mypy app/
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
        entry: bash -c 'cd backend && UV_PROJECT_ENVIRONMENT=.venv uv run mypy app/'

      # --------- Frontend ---------
      - id: frontend-prettier
        name: frontend prettier --check
        language: system
        files: ^frontend/
        exclude: ^frontend/(\.svelte-kit/|build/|node_modules/|coverage/|test-results/|playwright-report/|tests/e2e/fixtures/.*\.(png|bin))
        pass_filenames: false
        entry: bash -c 'cd frontend && npm run format:check'

      - id: frontend-eslint
        name: frontend eslint
        language: system
        files: ^frontend/.*\.(ts|js|svelte)$
        exclude: ^frontend/(\.svelte-kit/|build/|node_modules/)
        pass_filenames: false
        entry: bash -c 'cd frontend && npm run lint'

      - id: frontend-svelte-check
        name: frontend svelte-check
        language: system
        files: ^frontend/.*\.(ts|svelte)$
        exclude: ^frontend/(\.svelte-kit/|build/|node_modules/)
        pass_filenames: false
        entry: bash -c 'cd frontend && npm run check'
