sonar.projectKey=tholent_weft
sonar.organization=tholent

# Source roots
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src

# Python coverage report (generated by: cd backend && tox -e py312)
sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript/TypeScript coverage report (generated by: cd frontend && npm run test:coverage)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
