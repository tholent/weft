sonar.projectKey=tholent_weft
sonar.organization=tholent

# Source roots. Each path must be disjoint from sonar.tests — Sonar refuses
# to index a file as both source and test.
sonar.sources=backend/app,frontend/src

# Test roots. Must not overlap with sonar.sources.
sonar.tests=backend/tests,frontend/tests

# Exclude the frontend's generated SvelteKit output and coverage artifacts
# from analysis.
sonar.exclusions=frontend/.svelte-kit/**,frontend/build/**,frontend/coverage/**,frontend/playwright-report/**,frontend/test-results/**,frontend/node_modules/**,backend/.venv/**,backend/.tox/**

# Python coverage report (generated by: cd backend && tox -e py312)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.version=3.12

# JavaScript/TypeScript coverage report (generated by: cd frontend && npm run test:coverage)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
